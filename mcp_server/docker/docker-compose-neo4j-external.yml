services:
  graphiti-mcp:
    # Use a local image tag so `up --build` always produces and reuses a
    # source-built standalone image for this deployment path instead of the
    # registry's combined/older variants.
    image: graphiti-mcp-neo4j-external:local
    container_name: graphiti-mcp
    restart: always
    env_file:
      - ../.env.nas
    build:
      # Relative default works when running from mcp_server/docker on the NAS.
      # Override MCP_BUILD_CONTEXT if your compose project uses a different root.
      context: ${MCP_BUILD_CONTEXT:-..}
      dockerfile: docker/Dockerfile.standalone
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple}
        UV_DEFAULT_INDEX: ${UV_DEFAULT_INDEX:-https://pypi.org/simple}
    environment:
      - CONFIG_PATH=/app/mcp/config/config.yaml
      - MCP_ALLOWED_HOSTS=${MCP_ALLOWED_HOSTS:-0.0.0.0:*,localhost:*,127.0.0.1:*,192.168.123.104:*}
      - NEO4J_URI=${NEO4J_URI:-bolt://192.168.123.104:7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:?NEO4J_PASSWORD is required}
      - NEO4J_DATABASE=${NEO4J_DATABASE:-neo4j}
      - GRAPHITI_GROUP_ID=${GRAPHITI_GROUP_ID:-nas_mcp}
      - SEMAPHORE_LIMIT=${SEMAPHORE_LIMIT:-10}
      - LLM_MODEL=${LLM_MODEL:-glm-5}
      - OPENAI_API_KEY=${OPENAI_API_KEY:?OPENAI_API_KEY is required}
      - OPENAI_API_URL=${OPENAI_API_URL:-https://open.bigmodel.cn/api/paas/v4/}
      - EMBEDDER_PROVIDER=${EMBEDDER_PROVIDER:-openai}
      - EMBEDDER_OPENAI_API_KEY=${EMBEDDER_OPENAI_API_KEY:-ollama}
      - EMBEDDER_OPENAI_API_URL=${EMBEDDER_OPENAI_API_URL:-http://192.168.123.74:11434/v1}
      - EMBEDDER_MODEL=${EMBEDDER_MODEL:-qwen3-embedding:0.6b}
      - EMBEDDER_DIMENSIONS=${EMBEDDER_DIMENSIONS:-1024}
    volumes:
      - ${MCP_CONFIG_SOURCE:-../config/config-docker-neo4j-external.yaml}:/app/mcp/config/config.yaml:ro
    ports:
      - "${MCP_PORT:-8011}:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    command: ["uv", "run", "--no-sync", "main.py"]
